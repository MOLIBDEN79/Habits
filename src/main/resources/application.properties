# Local secrets (e.g. DB password) live in application-local.properties, which is gitignored.
# Copy application-local.properties.example to application-local.properties and set your password.
spring.config.import=optional:file:./application-local.properties

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:habits_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DATABASE_SCHEMA:public}
spring.jpa.hibernate.ddl-auto=update

spring.thymeleaf.cache=false
spring.main.allow-circular-references=true

server.port=${PORT:8080}
file.upload-dir=${UPLOAD_DIR:/tmp/uploaded-files}