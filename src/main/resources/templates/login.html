<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="form-container">
    <h1>Вход</h1>
    <form th:action="@{/login}" method="post">
        <label>
            <input type="text" placeholder="Имя пользователя" name="username" th:value="${username}" required>
        </label>
        <label>
            <input type="password" placeholder="Пароль" name="password" required>
        </label>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button type="submit">Войти</button>

        <div th:if="${loginError!=null}" th:text="${loginError}" style="color: red">
        </div>
    </form>

    <div class="register">
        <p>У тебя всё ещё нету аккаунта?</p>
        <button onclick="window.location.href='/register';" class="btn btn-secondary">Регистрация</button>
    </div>

</div>
</body>
</html>
