<!--==================== HEADER ====================-->
<header class="header" id="header" th:fragment="header" xmlns:th="http://www.thymeleaf.org">
    <nav class="nav container">
        <a href="/" class="nav__logo">
            <i class="ri-cactus-line"></i> CACTU
        </a>

        <div class="nav__menu" id="nav-menu">
            <ul class="nav__list">
                <li class="nav__item">
                    <a href="#home" class="nav__link active-link">Главная</a>
                </li>
                <li class="nav__item">
                    <a href="#new" class="nav__link">Уровни</a>
                </li>
                <li class="nav__item">
                    <a href="#shop" class="nav__link">Скины</a>
                </li>
                <li class="nav__item">
                    <a href="#care" class="nav__link">Советы</a>
                </li>
                <li class="nav__item">
                    <a href="#contact" class="nav__link">Контакты</a>
                </li>
                <li class="nav__item">
                    <a th:href="@{/calendar}" class="nav__link">Календарь</a>
                </li>
            </ul>
            <div class="nav__close" id="nav-close">
                <i class="ri-close-line"></i>
            </div>
        </div>

        <div class="nav__actions">
            <a href="/profile" class="profile-text">
                <i class="ri-user-line"></i>
            </a>
        </div>

        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background: none; border: none; cursor: pointer; color: inherit; padding: 0;">
                <i class="ri-logout-box-line" style="font-size: 1.25rem;"></i>
            </button>
        </form>

        <div class="nav__toggle" id="nav-toggle">
            <i class="ri-menu-line"></i>
        </div>
    </nav>
</header>
