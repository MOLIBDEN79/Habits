<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление/Изменение привычки</title>
    <link rel="stylesheet" href="/css/form.css">
</head>
<body>
<div class="feedback-container">
    <h1>Добавление/Изменение привычки</h1>
    <form th:action="@{/habits/add}" th:object="${habit}" method="post">
        <input type="text" th:field="*{name}" placeholder="Название" required/><br/>
        <input type="text" th:field="*{trigger}" placeholder="Триггер" required/><br/>
        <input type="text" th:field="*{outcome}" placeholder="Результат" required/><br/>
        <input type="text" th:field="*{routine}" placeholder="Рутина" required/><br/>
        <select th:field="*{category.id}" required>
            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
        </select><br/>
        <button type="submit" value="Submit">Сохранить</button>
    </form>
</div>
